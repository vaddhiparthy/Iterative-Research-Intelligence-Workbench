services:
  research-workbench:
    container_name: research-workbench
    image: iterative-research-intelligence-workbench:latest
    build:
      context: .
    ports:
      - "9990:9990"
    restart: unless-stopped
    volumes:
      - research_workbench_vault:/vault
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:9990/api/scheduler/status').read(); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  research_workbench_vault:
